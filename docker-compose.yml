services:
  postgres:
    image: postgres:16-alpine
    container_name: eventdriven-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: eventdriven-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: eventdriven-kafka
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xmx256M -Xms256M"
    healthcheck:
      test: [ "CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 10

  user-service:
    build:
      context: "./-KTPM-Lab08_EventDriven"
      dockerfile: Dockerfile
    image: ${DOCKERHUB_USERNAME:-nhnn3106}/event-driven-user-service:latest
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@${REGION2_IP:-postgres}:5432/user_service?sslmode=disable
      - KAFKA_BROKER=${REGION2_IP:-kafka}:29092
      - JWT_SECRET=super-secret-key
      - JWT_EXPIRES_IN=15m
      - PORT=8081

  movie-service:
    build:
      context: ./movie-service
      dockerfile: Dockerfile
    image: ${DOCKERHUB_USERNAME:-nhnn3106}/event-driven-movie-service:latest
    container_name: movie-service
    ports:
      - "8082:8082"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@${REGION2_IP:-postgres}:5432/movie_service?sslmode=disable
      - KAFKA_BROKERS=${REGION2_IP:-kafka}:29092
      - KAFKA_CLIENT_ID=movie-service
      - PORT=8082
      - NODE_ENV=production

  booking-service:
    build:
      context: "./Booking Service_EventDriven"
      dockerfile: Dockerfile
    image: ${DOCKERHUB_USERNAME:-nhnn3106}/event-driven-booking-service:latest
    container_name: booking-service
    ports:
      - "8083:8083"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@${REGION2_IP:-postgres}:5432/booking_service?sslmode=disable
      - KAFKA_BROKER=${REGION2_IP:-kafka}:29092
      - PORT=8083

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    image: ${DOCKERHUB_USERNAME:-nhnn3106}/event-driven-payment-service:latest
    container_name: payment-service
    ports:
      - "8084:8084"
    environment:
      - DB_URL=jdbc:postgresql://${REGION2_IP:-postgres}:5432/payment_service
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - KAFKA_BROKER=${REGION2_IP:-kafka}:29092
      - PORT=8084

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    image: ${DOCKERHUB_USERNAME:-nhnn3106}/event-driven-notification-service:latest
    container_name: notification-service
    ports:
      - "8085:8085"
    environment:
      - DB_URL=jdbc:postgresql://${REGION2_IP:-postgres}:5432/notification_service
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - KAFKA_BROKER=${REGION2_IP:-kafka}:29092
      - PORT=8085

volumes:
  postgres_data:
