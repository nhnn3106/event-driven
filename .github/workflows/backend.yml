name: Backend CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push User Service
        uses: docker/build-push-action@v5
        with:
          context: ./-KTPM-Lab08_EventDriven
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/event-driven-user-service:latest

      - name: Build and Push Movie Service
        uses: docker/build-push-action@v5
        with:
          context: ./movie-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/event-driven-movie-service:latest

      - name: Build and Push Booking Service
        uses: docker/build-push-action@v5
        with:
          context: "./Booking Service_EventDriven"
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/event-driven-booking-service:latest

      - name: Build and Push Payment Service
        uses: docker/build-push-action@v5
        with:
          context: ./payment-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/event-driven-payment-service:latest

      - name: Build and Push Notification Service
        uses: docker/build-push-action@v5
        with:
          context: ./notification-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/event-driven-notification-service:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to Region 1
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST_REGION1 }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY_REGION1 }}
          source: "docker-compose.yml"
          target: "~/app"

      - name: Deploy to Region 1
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_REGION1 }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY_REGION1 }}
          script: |
            mkdir -p ~/app
            cd ~/app
            echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" > .env
            echo "REGION2_IP=${{ secrets.EC2_HOST_REGION2 }}" >> .env
            compose pull
            compose up -d movie-service user-service booking-service

      - name: Copy docker-compose.yml to Region 2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST_REGION2 }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY_REGION2 }}
          source: "docker-compose.yml"
          target: "~/app"

      - name: Deploy to Region 2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_REGION2 }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY_REGION2 }}
          script: |
            mkdir -p ~/app
            cd ~/app
            echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" > .env
            echo "REGION2_IP=localhost" >> .env
            compose pull
            compose up -d payment-service notification-service postgres kafka zookeeper
